services:
  zomboid:
    build: .
    restart: unless-stopped

    ports:
      - "16261:16261/udp"
      - "16262:16262/udp"
      - "8766:8766/udp"
      - "8767:8767/udp"

    environment:
      - SERVER_NAME=${SERVER_NAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}

    volumes:
      - ./data:/root/Zomboid
      - ./install:/pz
